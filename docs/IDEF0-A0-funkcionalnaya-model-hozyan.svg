  <text x="550" y="652" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Платформа: React, Node, SQLite, REST /api/*</text>
  <text x="840" y="652" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Инфраструктура (Render, CORS, uploads)</text>

