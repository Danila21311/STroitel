    <text x="865" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">/checkout · RequireAuth · POST /api/orders</text>
    <text x="865" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">Оплата CARD → статус PAID (имитация)</text>
    <text x="958" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">3</text>
  </g>
  <g>
    <rect x="120" y="300" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="235" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111827">4. Доступ и профиль</text>
