  <g>
    <rect x="120" y="110" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="235" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111827">1. Витрина и поиск</text>
