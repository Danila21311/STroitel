  <text x="28" y="174" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">(каталог, поиск, карточка)</text>

  <line x1="24" y1="230" x2="118" y2="230" stroke="#1e3a8a" stroke-width="2" marker-end="url(#m)"/>
  <text x="28" y="218" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Действия с корзиной и избранным</text>

  <line x1="24" y1="300" x2="118" y2="300" stroke="#1e3a8a" stroke-width="2" marker-end="url(#m)"/>
  <text x="28" y="288" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Учётные данные (регистрация / вход)</text>

  <line x1="24" y1="430" x2="118" y2="430" stroke="#1e3a8a" stroke-width="2" marker-end="url(#m)"/>
  <text x="28" y="418" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Данные заказа (адрес, оплата, состав)</text>

  <line x1="220" y1="70" x2="220" y2="108" stroke="#1e3a8a" stroke-width="2" marker-end="url(#m)"/>
