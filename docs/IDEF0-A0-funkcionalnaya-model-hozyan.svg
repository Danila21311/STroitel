  <text x="36" y="542" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#111827">Связь с контекстной диаграммой A-0</text>
  <text x="36" y="562" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">Входы слева — запросы, данные заказа и учёт; сверху — политики и бизнес-правила.</text>
  <text x="36" y="582" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">Справа — ответы пользователю и сведения для админки; снизу — роли и ПТС.</text>
