<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <marker id="m" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a8a"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1100" height="700" fill="#fafbff"/>
  <rect width="1100" height="700" fill="url(#grid)" opacity="0.45"/>

  <text x="550" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#111827">A0. Декомпозиция: веб-приложение строительного магазина «Хозяин»</text>
  <text x="550" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Клиент React/Vite · сервер Express/Sequelize/SQLite · JWT · роли ADMIN / MANAGER / CONTENT_MANAGER</text>

  <text x="70" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" transform="rotate(-90 70 380)">Входы</text>
  <text x="550" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Управление</text>
  <text x="1030" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827" transform="rotate(90 1030 380)">Выходы</text>
  <text x="550" y="688" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#111827">Механизмы</text>

