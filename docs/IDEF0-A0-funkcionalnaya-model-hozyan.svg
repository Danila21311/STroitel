    <text x="235" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">RequireAuth · bcrypt · роли</text>
    <text x="328" y="398" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">4</text>
  </g>
  <g>
    <rect x="435" y="300" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="550" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111827">5. Кабинет и отзывы</text>
    <text x="550" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">/account · /api/reviews</text>
    <text x="550" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">Отзывы на карточке (UGC)</text>
    <text x="643" y="398" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">5</text>
  </g>
  <g>
    <rect x="750" y="300" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="865" y="332" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111827">6. Администрирование</text>
    <text x="865" y="354" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">/admin/* · /api/admin/*</text>
    <text x="865" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">Товары, заказы, пользователи, модерация</text>
    <text x="958" y="398" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">6</text>
  </g>

