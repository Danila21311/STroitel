    <text x="235" y="184" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">SearchSuggest · GET /api/products, /categories</text>
    <text x="328" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">1</text>
  </g>
  <g>
    <rect x="435" y="110" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="550" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#111827">2. Корзина и избранное</text>
    <text x="550" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4b5563">/cart · ShopContext · localStorage</text>
    <text x="643" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">2</text>
  </g>
  <g>
    <rect x="750" y="110" width="230" height="104" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
