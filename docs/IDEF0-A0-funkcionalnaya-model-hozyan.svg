  <line x1="880" y1="70" x2="880" y2="108" stroke="#1e3a8a" stroke-width="2" marker-end="url(#m)"/>
  <text x="220" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Правила и политики</text>
  <text x="550" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Бизнес-правила (остатки, цены, скидки)</text>
  <text x="880" y="64" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#374151">Безопасность (JWT, helmet, zod)</text>

